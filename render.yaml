services:
  - type: web
    name: 81-maktab
    env: php
    buildCommand: composer install --no-dev --optimize-autoloader
    preDeployCommand: php artisan optimize:clear && php artisan migrate --force && php artisan route:cache && php artisan view:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
