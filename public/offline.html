<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aloqa yo'qolgan | 81-IDUM</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->

    <style>
        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.4);
            --bg-dark: #070b14;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Animated Background Mesh - Bomba Signature */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(45, 212, 191, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(13, 27, 45, 1) 0%, rgba(7, 11, 20, 1) 100%);
            animation: meshMove 20s infinite alternate ease-in-out;
        }

        @keyframes meshMove {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.1) rotate(3deg); }
        }

        .error-container {
            text-align: center;
            z-index: 1;
            padding: 50px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5);
            max-width: 540px;
            width: 92%;
            animation: containerIn 0.8s cubic-bezier(0.23, 1, 0.32, 1) both;
            position: relative;
            overflow: hidden;
        }

        @keyframes containerIn {
            from { opacity: 0; transform: translateY(40px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Radar Pulse Animation */
        .radar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
        }

        .radar-icon {
            position: relative;
            z-index: 3;
            width: 100%;
            height: 100%;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border: 2px solid var(--primary);
            border-radius: 35px;
            opacity: 0;
            z-index: 1;
            animation: radarPulse 3s infinite;
        }

        .pulse:nth-child(2) { animation-delay: 1s; }
        .pulse:nth-child(3) { animation-delay: 2s; }

        @keyframes radarPulse {
            0% { width: 100%; height: 100%; opacity: 0.5; }
            100% { width: 250%; height: 250%; opacity: 0; }
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 17px;
            color: #94a3b8;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-bomba {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 36px;
            background: linear-gradient(135deg, var(--primary), #2563eb);
            color: #fff;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 12px 24px var(--primary-glow);
            border: none;
            cursor: pointer;
        }

        .btn-bomba:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 20px 40px var(--primary-glow);
            filter: brightness(1.1);
        }

        .btn-bomba i {
            font-size: 18px;
            transition: transform 0.4s ease;
        }

        .btn-bomba:hover i {
            transform: rotate(360deg);
        }

        /* Floating particles */
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            pointer-events: none;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    
    <div class="error-container">
        <div class="status-badge">Offline</div>
        <div class="radar-wrapper">
            <div class="pulse"></div>
            <div class="pulse"></div>
            <div class="pulse"></div>
            <div class="radar-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 1l22 22"></path>
                    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
                    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
                    <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
                    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
                    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                    <path d="M12 20h.01"></path>
                </svg>
            </div>
        </div>
        <h1>Aloqa uzildi</h1>
        <p>Internet tarmog'ingizda uzilish yuz berdi. Xavotir olmang, biz sizning qurilmangizda ma'lumotlarni saqlab qoldik. Aloqa tiklanishi bilan davom etamiz.</p>
        
        <button onclick="window.location.reload()" class="btn-bomba">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 4v6h-6"></path>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            Qayta urinish
        </button>
    </div>

    <script>
        // Create random floating particles for the Bomba look
        for(let i = 0; i < 15; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            let size = Math.random() * 4 + 2;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            document.body.appendChild(p);
            
            p.animate([
                { transform: 'translate(0, 0)', opacity: 0.2 },
                { transform: `translate(${(Math.random()-0.5)*100}px, ${(Math.random()-0.5)*100}px)`, opacity: 0.5 }
            ], {
                duration: Math.random() * 8000 + 4000,
                iterations: Infinity,
                direction: 'alternate',
                easing: 'ease-in-out'
            });
        }

        // Auto-refresh when back online
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
