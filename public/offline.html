<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarmoqqa ulanmagansiz | 81-IDUM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #07111f;
      --primary: #7db4ff;
      --accent: #2dd4bf;
      --text: #e6eefb;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: radial-gradient(circle at 50% 50%, #0f1b2d 0%, #07111f 100%);
    }

    .offline-card {
      max-width: 420px;
      padding: 40px;
      text-align: center;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
      animation: cardIn 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      0% { opacity: 0; transform: translateY(40px) scale(0.9); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .radar-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 30px;
    }

    .radar-icon {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      background: rgba(125, 180, 255, 0.1);
      border: 1px solid rgba(125, 180, 255, 0.2);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: var(--primary);
    }

    .pulse {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
      background: var(--primary);
      border-radius: 30px;
      opacity: 0.3;
      z-index: 1;
      animation: pulseAnim 3s infinite;
    }

    .pulse:nth-child(2) { animation-delay: 1s; }
    .pulse:nth-child(3) { animation-delay: 2s; }

    @keyframes pulseAnim {
      0% { width: 100%; height: 100%; opacity: 0.3; }
      100% { width: 250%; height: 250%; opacity: 0; }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 0%, #7db4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: #9cb1cb;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      text-decoration: none;
      border-radius: 16px;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
    }

    .retry-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4);
      filter: brightness(1.1);
    }

    .retry-btn svg {
      transition: transform 0.5s ease;
    }

    .retry-btn:hover svg {
      transform: rotate(360deg);
    }
    
    /* System font fallbacks for offline mode */
    body {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="radar-container">
      <div class="pulse"></div>
      <div class="pulse"></div>
      <div class="pulse"></div>
      <div class="radar-icon">
        <!-- Embedded SVG for offline reliability -->
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 640 512" fill="currentColor">
          <path d="M633.8 458.1l-143.5-131.6c17.5-23.7 29.7-51 29.7-81.1c0-75.1-57.5-136.1-131-143.2l-105-96.2c-12.5-11.4-31.4-11.4-43.9 0l-105 96.2c-73.5 7.1-131 68.1-131 143.2c0 30.1 12.2 57.4 29.7 81.1L3.8 458.1c-6.4 5.9-6.9 15.9-1.1 22.4l15.6 17c5.9 6.4 15.9 6.9 22.4 1.1l592-542.4c6.4-5.9 6.9-15.9 1.1-22.4l-15.6-17c-5.9-6.4-15.9-6.9-22.4-1.1zM320 160c53 0 96 43 96 96c0 14.5-3.2 28.2-8.9 40.5L304.4 191.1c-12.3-5.7-26-8.9-40.5-8.9c-20.1 0-38.6 6.3-53.7 17l-123-112.8C154.5 106.8 234.3 96 320 96c85.7 0 165.5 10.8 232.8 29.4l-123 112.8c-15.1-10.7-33.6-17-53.7-17l0 0z"/>
        </svg>
      </div>
    </div>
    <h1>Aloqa yo'qolgan</h1>
    <p>Internetga ulanishda muammo yuz berdi. Iltimos, tarmog'ingizni tekshirib ko'ring va qayta urinib ko'ring.</p>
    <a href="/" class="retry-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 512 512" fill="currentColor">
        <path d="M105.1 202.6c7.7-21.8 20.2-42.3 37.8-59.8c62.5-62.5 163.8-62.5 226.3 0L386.3 160H336c-17.7 0-32 14.3-32 32s14.3 32 32 32H464c17.7 0 32-14.3 32-32V64c0-17.7-14.3-32-32-32s-32 14.3-32 32v51.2L414.4 97.6c-87.5-87.5-229.3-87.5-316.8 0C73.2 122 55.6 150.7 44.8 181.4c-5.9 16.7 2.9 34.9 19.5 40.8s34.9-2.9 40.8-19.5zM39 289.3c-5 1.5-9.8 4.2-13.7 8.2c-4 4-6.7 8.8-8.1 14c-5.9 16.7 2.9 34.9 19.5 40.8c31 10.9 59.8 28.5 84.2 52.9c87.5 87.5 229.3 87.5 316.8 0c24.4-24.4 42.1-53.1 52.9-83.7c5.9-16.7-2.9-34.9-19.5-40.8s-34.9 2.9-40.8 19.5c-7.7 21.8-20.2 42.3-37.8 59.8c-62.5 62.5-163.8 62.5-226.3 0L125.7 352H176c17.7 0 32-14.3 32-32s-14.3-32-32-32H48c-17.7 0-32 14.3-32 32V448c0 17.7 14.3 32 32 32s32-14.3 32-32V396.8l17.1 17.1c0 0 0 0 0 0l.5 .5z"/>
      </svg>
      Qayta urinish
    </a>
  </div>
  <script>
    // Animation for retry button
    document.querySelector('.retry-btn').addEventListener('click', function(e) {
      const btn = this;
      const svg = btn.querySelector('svg');
      
      // Infinite spin while "waiting" for potential reconnect
      svg.style.transition = 'transform 1s linear';
      svg.style.transform = 'rotate(360deg)';
      
      if (!window.navigator.onLine) {
        // If still offline, keep it spinning or reset after a delay
        setTimeout(() => {
          svg.style.transition = 'none';
          svg.style.transform = 'rotate(0deg)';
        }, 1000);
      }
    });
  </script>
</body>
</html>
